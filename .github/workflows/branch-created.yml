name: Move issue to In Progress

on:
  create:

permissions:
  contents: read
  issues: read
  repository-projects: write

jobs:
  move-card:

    if: github.event.ref_type == 'branch'

    runs-on: ubuntu-latest

    steps:

      - name: Extract issue number
        id: issue
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          if [[ "$BRANCH" =~ ^([0-9]+)- ]]; then
            echo "number=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "No issue number found"
            exit 0
          fi


      - name: Move issue in project
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}

        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}

          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);

            console.log(`Looking for issue #${issueNumber}`);

            const project = await github.graphql(`
              query {
                user(login: "Frederikmoeller") {
                  projectV2(number: 3) {
                    id
                    title
                  }
                }
              }
            `);

            console.log(JSON.stringify(project, null, 2));

            const projectId = project.user.projectV2.id;

            const fields = await github.graphql(`
            query($id:ID!) {
              node(id:$id) {
                ... on ProjectV2 {
                  fields(first:50) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
            `, {
              id: projectId
            });

            const items = await github.graphql(`
            query($id:ID!) {

              node(id:$id) {

                ... on ProjectV2 {

                  items(first:100) {

                    nodes {

                      id

                      content {

                        ... on Issue {

                          number
                          title

                        }

                      }

                    }

                  }

                }

              }

            }
            `,
            {
              id: projectId
            });


            console.log(JSON.stringify(items, null, 2));

            const issueItem = items.node.items.nodes.find(
              item => item.content?.number === issueNumber
            );

            if (!issueItem) {
              console.log(`Issue #${issueNumber} not found in project`);
              return;
            }

            console.log(`Found project item: ${issueItem.id}`);


            const statusField = fields.node.fields.nodes.find(
              field => field.name === "Status"
            );

            const inProgressOption = statusField.options.find(
              option => option.name === "In progress"
            );


            console.log(`Setting status to ${inProgressOption.name}`);


            await github.graphql(`
            mutation(
              $project:ID!,
              $item:ID!,
              $field:ID!,
              $option:String!
            ) {

              updateProjectV2ItemFieldValue(
                input:{
                  projectId:$project
                  itemId:$item
                  fieldId:$field
                  value:{
                    singleSelectOptionId:$option
                  }
                }
              ){

                projectV2Item {
                  id
                }

              }

            }
            `,
            {
              project: projectId,
              item: issueItem.id,
              field: statusField.id,
              option: inProgressOption.id
            });


            console.log("Moved issue to In Progress!");