# Required repository secret:
# PROJECT_TOKEN
#
# Token permissions:
# - project
#
# Configuration:
# PROJECT_OWNER
# PROJECT_NUMBER
# STATUS_FIELD_NAME
# IN_PROGRESS_OPTION_NAME

name: Branch created - update project status

on:
  create:

permissions:
  contents: read
  issues: read
  repository-projects: write

env:
  PROJECT_OWNER: Frederikmoeller
  PROJECT_NUMBER: 3
  STATUS_FIELD_NAME: Status
  IN_PROGRESS_OPTION_NAME: In progress

jobs:
  update-project-status:

    if: github.event.ref_type == 'branch'

    runs-on: ubuntu-latest

    steps:

      - name: Extract issue number
        id: issue
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          if [[ "$BRANCH" =~ ^([0-9]+)- ]]; then
            echo "number=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "Branch does not contain an issue number. Skipping."
            exit 0
          fi


      - name: Update Project status
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          PROJECT_OWNER: ${{ env.PROJECT_OWNER }}
          PROJECT_NUMBER: ${{ env.PROJECT_NUMBER }}
          STATUS_FIELD_NAME: ${{ env.STATUS_FIELD_NAME }}
          IN_PROGRESS_OPTION_NAME: ${{ env.IN_PROGRESS_OPTION_NAME }}

        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}

          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);

            if (!issueNumber) {
              console.log("No issue number found. Skipping.");
              return;
            }

            console.log(`Looking for issue #${issueNumber}`);

            const project = await github.graphql(`
            query {
              user(login: "${process.env.PROJECT_OWNER}") {
                projectV2(number: ${process.env.PROJECT_NUMBER}) {
                    id
                    title
                  }
                }
              }
            `);

            console.log(JSON.stringify(project, null, 2));

            if (!project.user.projectV2) {
              throw new Error(
                `Could not find project ${process.env.PROJECT_NUMBER}`
              );
            }

            const projectId = project.user.projectV2.id;

            const fields = await github.graphql(`
            query($id:ID!) {
              node(id:$id) {
                ... on ProjectV2 {
                  fields(first:50) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
            `, {
              id: projectId
            });

            const items = await github.graphql(`
            query($id:ID!) {

              node(id:$id) {

                ... on ProjectV2 {

                  items(first:100) {

                    nodes {

                      id

                      content {

                        ... on Issue {

                          number
                          title

                        }

                      }

                    }

                  }

                }

              }

            }
            `,
            {
              id: projectId
            });


            console.log(`Found ${items.node.items.nodes.length} project items`);

            const issueItem = items.node.items.nodes.find(
              item => item.content?.number === issueNumber
            );

            if (!issueItem) {
              console.log(`Issue #${issueNumber} not found in project`);
              return;
            }

            console.log(`Found project item: ${issueItem.id}`);


            const statusField = fields.node.fields.nodes.find(
              field => field.name === process.env.STATUS_FIELD_NAME
            );

            if (!statusField) {
              throw new Error("Could not find Status field");
            }

            const inProgressOption = statusField.options.find(
              option => option.name === process.env.IN_PROGRESS_OPTION_NAME
            );

            if (!inProgressOption) {
              throw new Error("Could not find In Progress option");
            }

            console.log(`Setting status to ${inProgressOption.name}`);


            await github.graphql(`
            mutation(
              $project:ID!,
              $item:ID!,
              $field:ID!,
              $option:String!
            ) {

              updateProjectV2ItemFieldValue(
                input:{
                  projectId:$project
                  itemId:$item
                  fieldId:$field
                  value:{
                    singleSelectOptionId:$option
                  }
                }
              ){

                projectV2Item {
                  id
                }

              }

            }
            `,
            {
              project: projectId,
              item: issueItem.id,
              field: statusField.id,
              option: inProgressOption.id
            });


            console.log("Moved issue to In Progress!");