name: Move issue to In Progress

on:
  create:

permissions:
  contents: read
  issues: read
  repository-projects: write

jobs:
  move-card:

    if: github.event.ref_type == 'branch'

    runs-on: ubuntu-latest

    steps:

      - name: Extract issue number
        id: issue
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          if [[ "$BRANCH" =~ ^([0-9]+)- ]]; then
            echo "number=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "No issue number found"
            exit 0
          fi


      - name: Move issue in project
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);

            console.log(`Looking for issue #${issueNumber}`);

            const project = await github.graphql(`
              query {
                user(login: "Frederikmoeller") {
                  projectV2(number: 3) {
                    id
                    title
                  }
                }
              }
            `);

            console.log(project);

            const projectData = project.user.projectV2;


            const fields = await github.graphql(`
              query($id:ID!) {

                node(id:$id) {

                  ... on ProjectV2 {

                    fields(first:50) {

                      nodes {

                        ... on ProjectV2SingleSelectField {

                          id
                          name

                          options {
                            id
                            name
                          }

                        }

                      }

                    }

                  }

                }

              }
            `,
            {
              id: projectData.id
            });


            console.log(JSON.stringify(fields,null,2));